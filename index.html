<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jharika Looks ✨ | Premium Ethnic Wear</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Initial Data ---
        const INITIAL_CONFIG = {
            logo: "https://api.dicebear.com/7.x/initials/svg?seed=JL&backgroundColor=800000",
            banners: [
                "https://images.pexels.com/photos/6069565/pexels-photo-6069565.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/8750030/pexels-photo-8750030.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2"
            ],
            midBanner: "https://images.pexels.com/photos/2103942/pexels-photo-2103942.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
            sareeImage: "https://images.pexels.com/photos/8750030/pexels-photo-8750030.jpeg",
            readymadeImage: "https://images.pexels.com/photos/35820445/pexels-photo-35820445.jpeg",
            whatsapp: "9771827986",
            email: "jharikalooks@gmail.com",
            address: "Ormanjhi, Ranchi, Jharkhand - 835219"
        };

        const INITIAL_CATEGORIES = [
            { id: '1', name: 'Silk', parent: 'Saree', image: 'https://images.pexels.com/photos/27575174/pexels-photo-27575174.jpeg' },
            { id: '2', name: 'Chiffon', parent: 'Saree', image: 'https://images.pexels.com/photos/2103942/pexels-photo-2103942.jpeg' },
            { id: '3', name: 'Kurti', parent: 'Readymade', image: 'https://images.pexels.com/photos/13454130/pexels-photo-13454130.jpeg' }
        ];

        const INITIAL_PRODUCTS = [
            { id: 'p1', name: 'Royal Silk Saree', price: 1250, image: 'https://images.pexels.com/photos/27575174/pexels-photo-27575174.jpeg', category: 'Saree', subCategory: 'Silk', moq: 10, description: 'Premium quality silk.', isNew: true },
            { id: 'p2', name: 'Cotton Kurti', price: 450, image: 'https://images.pexels.com/photos/13454130/pexels-photo-13454130.jpeg', category: 'Readymade', subCategory: 'Kurti', moq: 20, description: 'Comfortable daily wear.', isNew: true }
        ];

        // --- Components ---

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const BannerCarousel = ({ banners }) => {
            const [current, setCurrent] = useState(0);
            useEffect(() => {
                const timer = setInterval(() => setCurrent(s => (s + 1) % banners.length), 5000);
                return () => clearInterval(timer);
            }, [banners]);

            return (
                <div className="relative h-[250px] md:h-[450px] overflow-hidden rounded-2xl mx-4 mt-4 shadow-lg bg-gray-200">
                    {banners.map((img, i) => (
                        <img key={i} src={img} className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${i === current ? 'opacity-100' : 'opacity-0'}`} />
                    ))}
                    <div className="absolute inset-0 bg-black/20 flex items-center justify-center text-center">
                        <div className="text-white px-4">
                            <h2 className="text-3xl md:text-5xl font-bold mb-2">Jharika Looks ✨</h2>
                            <p className="text-lg md:text-xl opacity-90">Premium Ethnic Wear Collection</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductCard = ({ product, onClick }) => (
            <div onClick={() => onClick(product)} className="bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm cursor-pointer hover:shadow-md transition-all">
                <div className="aspect-[3/4] overflow-hidden relative">
                    <img src={product.image} className="w-full h-full object-cover" />
                    {product.isNew && <span className="absolute top-2 left-2 bg-rose-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">NEW</span>}
                </div>
                <div className="p-3">
                    <h4 className="font-bold text-gray-900 truncate">{product.name}</h4>
                    <div className="flex justify-between items-center mt-1">
                        <span className="text-rose-600 font-bold">₹{product.price}</span>
                        <span className="text-[10px] text-gray-400">Min: {product.moq}</span>
                    </div>
                </div>
            </div>
        );

        // --- Main App ---

        function App() {
            const [view, setView] = useState({ name: 'home' });
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('jl_p')) || INITIAL_PRODUCTS);
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('jl_c')) || INITIAL_CATEGORIES);
            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('jl_cfg')) || INITIAL_CONFIG);
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                localStorage.setItem('jl_p', JSON.stringify(products));
                localStorage.setItem('jl_c', JSON.stringify(categories));
                localStorage.setItem('jl_cfg', JSON.stringify(config));
            }, [products, categories, config]);

            const navigate = (name, params = {}) => {
                setView({ name, ...params });
                window.scrollTo(0, 0);
            };

            // --- Render Logic ---

            if (view.name === 'admin') {
                return <AdminPanel config={config} setConfig={setConfig} products={products} setProducts={setProducts} categories={categories} setCategories={setCategories} onBack={() => navigate('home')} />;
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-50 px-4 h-16 flex items-center justify-between">
                        <div onClick={() => navigate('home')} className="flex items-center gap-2 cursor-pointer">
                            <img src={config.logo} className="h-10 w-10 rounded-full object-cover" />
                            <span className="text-xl font-bold">Jharika Looks ✨</span>
                        </div>
                        <button onClick={() => navigate('admin')} className="text-gray-400"><Icon name="settings" size={20} /></button>
                    </header>

                    <main className="flex-grow pb-20">
                        {view.name === 'home' && (
                            <div className="space-y-10 fade-in">
                                <BannerCarousel banners={config.banners} />
                                
                                {/* Categories */}
                                <div className="grid grid-cols-2 gap-4 px-4">
                                    <div onClick={() => navigate('cat_list', { type: 'Saree' })} className="aspect-square relative rounded-2xl overflow-hidden cursor-pointer group">
                                        <img src={config.sareeImage} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform" />
                                        <div className="absolute inset-0 bg-black/30 flex items-center justify-center"><span className="text-white text-2xl font-bold">Saree</span></div>
                                    </div>
                                    <div onClick={() => navigate('cat_list', { type: 'Readymade' })} className="aspect-square relative rounded-2xl overflow-hidden cursor-pointer group">
                                        <img src={config.readymadeImage} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform" />
                                        <div className="absolute inset-0 bg-black/30 flex items-center justify-center"><span className="text-white text-2xl font-bold">Readymade</span></div>
                                    </div>
                                </div>

                                {/* New Arrivals */}
                                <div className="px-4">
                                    <h3 className="text-xl font-bold mb-4">New Arrivals ✨</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {products.filter(p => p.isNew).map(p => <ProductCard key={p.id} product={p} onClick={(p) => navigate('detail', { product: p })} />)}
                                    </div>
                                </div>

                                {/* Mid Banner */}
                                <div className="px-4 h-40 md:h-64 overflow-hidden rounded-2xl">
                                    <img src={config.midBanner} className="w-full h-full object-cover" />
                                </div>

                                {/* All Products */}
                                <div className="px-4">
                                    <h3 className="text-xl font-bold mb-4">All Products 🛍️</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {products.map(p => <ProductCard key={p.id} product={p} onClick={(p) => navigate('detail', { product: p })} />)}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view.name === 'cat_list' && (
                            <div className="p-4 fade-in">
                                <button onClick={() => navigate('home')} className="flex items-center gap-2 mb-6 text-gray-500"><Icon name="arrow-left" size={20}/> Back</button>
                                <h2 className="text-2xl font-bold mb-6">{view.type} Categories</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {categories.filter(c => c.parent === view.type).map(cat => (
                                        <div key={cat.id} onClick={() => navigate('prod_list', { sub: cat.name })} className="cursor-pointer">
                                            <div className="aspect-[4/5] rounded-xl overflow-hidden mb-2 border"><img src={cat.image} className="w-full h-full object-cover" /></div>
                                            <p className="text-center font-bold">{cat.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view.name === 'prod_list' && (
                            <div className="p-4 fade-in">
                                <button onClick={() => navigate('home')} className="flex items-center gap-2 mb-6 text-gray-500"><Icon name="arrow-left" size={20}/> Back</button>
                                <h2 className="text-2xl font-bold mb-6">{view.sub} Collection</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {products.filter(p => p.subCategory === view.sub).map(p => <ProductCard key={p.id} product={p} onClick={(p) => navigate('detail', { product: p })} />)}
                                </div>
                            </div>
                        )}

                        {view.name === 'detail' && (
                            <ProductDetail product={view.product} config={config} onBack={() => navigate('home')} />
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-900 text-white p-8">
                        <div className="max-w-7xl mx-auto space-y-4">
                            <h3 className="text-xl font-bold">Jharika Looks ✨</h3>
                            <p className="text-gray-400 text-sm">{config.address}</p>
                            <p className="text-green-400 font-bold">WhatsApp: {config.whatsapp}</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const ProductDetail = ({ product, config, onBack }) => {
            const [qty, setQty] = useState(product.moq);
            const checkout = () => {
                const msg = `*Inquiry from Website*\nProduct: ${product.name}\nPrice: ₹${product.price}\nQty: ${qty}\nImage: ${product.image}`;
                window.open(`https://wa.me/${config.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
            };
            return (
                <div className="p-4 md:flex gap-10 max-w-5xl mx-auto fade-in">
                    <button onClick={onBack} className="md:hidden mb-4 flex items-center gap-2"><Icon name="arrow-left" size={20}/> Back</button>
                    <div className="md:w-1/2 aspect-[3/4] rounded-2xl overflow-hidden border">
                        <img src={product.image} className="w-full h-full object-cover" />
                    </div>
                    <div className="md:w-1/2 mt-6 md:mt-0">
                        <h1 className="text-3xl font-bold mb-2">{product.name}</h1>
                        <p className="text-2xl text-rose-600 font-bold mb-4">₹{product.price}</p>
                        <p className="text-gray-600 mb-8">{product.description}</p>
                        <div className="bg-gray-100 p-4 rounded-xl mb-6">
                            <p className="text-sm font-bold mb-2">Quantity (Min Buy: {product.moq})</p>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setQty(Math.max(product.moq, qty-1))} className="w-10 h-10 bg-white rounded border">-</button>
                                <span className="text-xl font-bold">{qty}</span>
                                <button onClick={() => setQty(qty+1)} className="w-10 h-10 bg-white rounded border">+</button>
                            </div>
                        </div>
                        <button onClick={checkout} className="w-full py-4 bg-green-600 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2">
                            <Icon name="message-circle" /> Buy Now on WhatsApp
                        </button>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ config, setConfig, products, setProducts, categories, setCategories, onBack }) => {
            const [pass, setPass] = useState("");
            const [isLogged, setIsLogged] = useState(false);
            if (!isLogged) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
                            <h2 className="text-2xl font-bold mb-6 text-center">Admin Login</h2>
                            <input type="password" placeholder="Enter Password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full p-3 border rounded-xl mb-4" />
                            <button onClick={() => pass === "Abhay@9006" ? setIsLogged(true) : alert("Wrong")} className="w-full py-3 bg-black text-white rounded-xl font-bold">Login</button>
                            <button onClick={onBack} className="w-full mt-4 text-gray-500">Back to Website</button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="p-4 max-w-4xl mx-auto space-y-10">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-bold">CMS Dashboard</h2>
                        <button onClick={onBack} className="px-4 py-2 bg-gray-200 rounded-lg">Exit Admin</button>
                    </div>
                    
                    <section className="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                        <h3 className="text-xl font-bold border-b pb-2">Branding & Images</h3>
                        <div className="grid gap-4">
                            <label className="text-sm">Main Banner URL</label>
                            <input value={config.banners[0]} onChange={e => setConfig({...config, banners: [e.target.value, ...config.banners.slice(1)]})} className="p-2 border rounded w-full" />
                            <label className="text-sm">Saree Category Image</label>
                            <input value={config.sareeImage} onChange={e => setConfig({...config, sareeImage: e.target.value})} className="p-2 border rounded w-full" />
                            <label className="text-sm">Readymade Category Image</label>
                            <input value={config.readymadeImage} onChange={e => setConfig({...config, readymadeImage: e.target.value})} className="p-2 border rounded w-full" />
                            <label className="text-sm">Middle Promo Banner</label>
                            <input value={config.midBanner} onChange={e => setConfig({...config, midBanner: e.target.value})} className="p-2 border rounded w-full" />
                        </div>
                    </section>

                    <section className="bg-white p-6 rounded-2xl border shadow-sm">
                        <h3 className="text-xl font-bold border-b pb-4 mb-4 flex justify-between">Products <button onClick={() => setProducts([{id: Date.now().toString(), name: 'New', price: 0, image: '', category: 'Saree', subCategory: 'Silk', moq: 1, isNew: true}, ...products])} className="text-sm bg-rose-600 text-white px-3 py-1 rounded">+ Add</button></h3>
                        <div className="space-y-4">
                            {products.map(p => (
                                <div key={p.id} className="flex gap-4 p-4 border rounded-xl items-center">
                                    <img src={p.image} className="w-16 h-16 object-cover rounded" />
                                    <div className="flex-grow grid grid-cols-2 gap-2">
                                        <input value={p.name} onChange={e => setProducts(products.map(x => x.id === p.id ? {...x, name: e.target.value} : x))} className="p-1 border text-sm" placeholder="Name" />
                                        <input type="number" value={p.price} onChange={e => setProducts(products.map(x => x.id === p.id ? {...x, price: e.target.value} : x))} className="p-1 border text-sm" placeholder="Price" />
                                        <input value={p.image} onChange={e => setProducts(products.map(x => x.id === p.id ? {...x, image: e.target.value} : x))} className="p-1 border text-sm col-span-2" placeholder="Image URL" />
                                    </div>
                                    <button onClick={() => setProducts(products.filter(x => x.id !== p.id))} className="text-red-500">X</button>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
